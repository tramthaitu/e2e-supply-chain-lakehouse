# 1. Khai báo loại phích cắm (Lỗi của bạn nằm ở việc thiếu dòng này)
connector.name=iceberg

# 2. Cấu hình kết nối với Nessie Catalog (Sổ cái quản lý bảng)
iceberg.catalog.type=nessie
iceberg.nessie-catalog.uri=http://nessie-catalog:19120/api/v1
iceberg.nessie-catalog.ref=main
iceberg.nessie-catalog.default-warehouse-dir=s3://local-lakehouse/

# 3. Cấu hình kết nối với MinIO (Kho chứa file vật lý)
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.region=us-east-1
s3.path-style-access=true
s3.aws-access-key=admin
s3.aws-secret-key=password123