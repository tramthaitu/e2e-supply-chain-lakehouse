name: 'data_automation_project'
version: '1.0.0'
config-version: 2

# Profile đã đổi thành dbt_trino cho khớp với profiles.yml
profile: 'dbt_trino'

# Thủ thuật chống lỗi Docker Desktop trên Windows (Giữ nguyên)
packages-install-path: /tmp/dbt_packages

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

# =================================================================
# MODEL CONFIGURATION (Kết hợp Tags + Schema + Parquet)
# =================================================================
models:
  data_automation_project:
    
    staging:
      +materialized: table
      +schema: staging
      +tags: ["staging"]
      +table_properties:
        format: 'PARQUET'

    intermediate:
      +materialized: table 
      +schema: intermediate
      +tags: ["intermediate"]
      +table_properties:
        format: 'PARQUET'

    marts:
      +materialized: table
      +schema: marts
      +tags: ["mart", "production"]
      # ĐẶC SẢN CỦA LAKEHOUSE TRINO: Ép định dạng file parquet xuống MinIO
      +table_properties:
        format: 'PARQUET'

# =================================================================
# DATA TESTS CONFIGURATION (Chuyển về WARN thay vì FAIL pipeline)
# =================================================================
data_tests:
  data_automation_project:
    +severity: warn