services:
  spark-master:
    container_name: spark-master
    hostname: spark-master
    build:
      context: ./spark_config
      dockerfile: Dockerfile.spark
    image: custom-spark-lakehouse:latest
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --webui-port 8081
    environment:
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-admin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-password123}
    ports:
      - "4040:4040"  
      - "8083:8081"  
      - "7077:7077"  
    volumes:
      - ./spark_config/jars:/opt/spark/custom_jars
      - ./spark_config/spark:/opt/app
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8081"]
      interval: 10s
      timeout: 5s
      retries: 5

  spark-worker-1:
    container_name: spark-worker-1
    hostname: spark-worker-1
    image: custom-spark-lakehouse:latest
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker --webui-port 8082 spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=3g
      - SPARK_WORKER_CORES=2
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-admin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-password123}
    volumes:
      - ./spark_config/jars:/opt/spark/custom_jars
      - ./spark_config/spark:/opt/app
    depends_on:
      spark-master:
        condition: service_healthy
    ports:
      - "8084:8082"
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8082"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  lakehouse-net:
    name: lakehouse-net
    external: true